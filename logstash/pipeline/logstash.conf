input {
  beats {
    port => 5044
    # ssl => true  # Uncomment + configure certs for production TLS
  }
}

filter {
  # ── Step 1: Try JSON-structured log parsing first ──────────────────────────
  if [message] =~ /^\s*\{/ {
    json {
      source          => "message"
      skip_on_invalid_json => true
      target          => "parsed"
      add_tag         => ["json_log"]
    }
    if "_jsonparsefailure" not in [tags] {
      mutate {
        rename => {
          "[parsed][level]"      => "log_level"
          "[parsed][service]"    => "service_name"
          "[parsed][message]"    => "log_message"
          "[parsed][request_id]" => "request_id"
          "[parsed][latency_ms]" => "latency_ms"
          "[parsed][status]"     => "http_status"
        }
        remove_field => ["parsed", "message"]
      }
    }
  }

  # ── Step 2: Fallback grok for plaintext logs ────────────────────────────────
  if "json_log" not in [tags] {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} \[%{DATA:service_name}\] %{GREEDYDATA:log_message}",
          "%{LOGLEVEL:log_level}:%{SPACE}%{GREEDYDATA:log_message}"
        ]
      }
      tag_on_failure => ["_grokparsefailure"]
    }
  }

  # ── Step 3: Normalise @timestamp ───────────────────────────────────────────
  if [log_timestamp] {
    date {
      match      => ["log_timestamp", "ISO8601"]
      target     => "@timestamp"
      remove_field => ["log_timestamp"]
    }
  }

  # ── Step 4: Uppercase log level for consistent KQL queries ─────────────────
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
  }

  # ── Step 5: Tag high-severity events for alerting ──────────────────────────
  if [log_level] in ["ERROR", "CRITICAL", "FATAL"] {
    mutate {
      add_tag   => ["error_event", "alert_candidate"]
      add_field => { "alert.severity" => "high" }
    }
  } else if [log_level] == "WARN" {
    mutate {
      add_tag   => ["warn_event"]
      add_field => { "alert.severity" => "medium" }
    }
  }

  # ── Step 6: Enrich with environment metadata ────────────────────────────────
  mutate {
    add_field => {
      "environment" => "development"
      "pipeline"    => "filebeat-logstash-es"
    }
  }

  # ── Step 7: Drop noisy internal Filebeat/ECS fields ────────────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "[log][offset]", "stream"]
  }
}

output {
  # ── Primary: route to per-service, per-day indices ─────────────────────────
  elasticsearch {
    hosts  => ["http://elasticsearch-01:9200", "http://elasticsearch-02:9200"]
    # Index naming: logs-{service}-YYYY.MM.dd  → supports daily ILM rollover
    index  => "logs-%{[service_name]}-%{+YYYY.MM.dd}"
    action => "index"
  }

  # ── Debug: uncomment to echo pipeline output to Logstash stdout ────────────
  # stdout { codec => rubydebug }
}
