http.host: "0.0.0.0"

# Pipeline tuning
pipeline.workers: 2          # match physical CPU cores available to the container
pipeline.batch.size: 250     # events per worker batch — balance latency vs. throughput
pipeline.batch.delay: 50     # ms to wait before dispatching an under-full batch

# Dead-letter queue: capture unparseable events instead of dropping them silently
dead_letter_queue.enable: true
dead_letter_queue.max_bytes: 1gb

# Monitoring (exposes /_node/stats via port 9600)
xpack.monitoring.enabled: false   # switch to true and point at your monitoring cluster in prod
