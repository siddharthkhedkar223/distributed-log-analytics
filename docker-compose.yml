version: "3.8"

# =============================================================================
# EFK Stack — Elasticsearch (2-node HA) + Fluentd + Kibana
# Docker Compose deployment with explicit resource limits.
#
# Key differences from a Kubernetes DaemonSet EFK setup:
#   - Runs entirely on a single Docker host (no K8s cluster needed)
#   - 2-node Elasticsearch cluster for replica shard HA
#   - All containers have hard memory/CPU caps to prevent host OOM
#   - Fluentd configured as a central aggregator (not per-node DaemonSet)
# =============================================================================

networks:
  efk-net:
    driver: bridge

volumes:
  es-data-01:
    driver: local
  es-data-02:
    driver: local
  kibana-data:
    driver: local
  fluentd-buffer:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # Elasticsearch Node 1  (master-eligible + data)
  # ---------------------------------------------------------------------------
  elasticsearch-01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch-01
    hostname: elasticsearch-01
    environment:
      - node.name=elasticsearch-01
      - cluster.name=efk-cluster
      - discovery.seed_hosts=elasticsearch-02
      - cluster.initial_master_nodes=elasticsearch-01,elasticsearch-02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false        # enable + TLS in production
      - ES_JAVA_OPTS=-Xms512m -Xmx512m      # heap = 50% of container limit
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1g        # hard cap — prevents OOM-kill cascade on shared hosts
          cpus: "1.0"
        reservations:
          memory: 512m
    volumes:
      - es-data-01:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - efk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Elasticsearch Node 2  (master-eligible + data) — provides quorum + HA
  # Primary shards from node-01 are replicated here; cluster survives one
  # node going down without data loss.
  # ---------------------------------------------------------------------------
  elasticsearch-02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch-02
    hostname: elasticsearch-02
    environment:
      - node.name=elasticsearch-02
      - cluster.name=efk-cluster
      - discovery.seed_hosts=elasticsearch-01
      - cluster.initial_master_nodes=elasticsearch-01,elasticsearch-02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    volumes:
      - es-data-02:/usr/share/elasticsearch/data
    networks:
      - efk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Fluentd — centralised log aggregator and router
  # Collects Docker container logs via the Fluentd logging driver,
  # enriches with container metadata, and routes to Elasticsearch indices.
  # ---------------------------------------------------------------------------
  fluentd:
    build:
      context: ./fluentd-solution
      dockerfile: Dockerfile           # installs fluent-plugin-elasticsearch
    container_name: fluentd
    hostname: fluentd
    volumes:
      - ./fluentd-solution/configs:/fluentd/etc:ro
      - fluentd-buffer:/fluentd/buffer  # persistent buffer — survives Fluentd restart
      - /var/log:/var/log:ro
    ports:
      - "24224:24224"     # Fluentd forward input (Docker logging driver)
      - "24224:24224/udp"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 128m
    networks:
      - efk-net
    depends_on:
      elasticsearch-01:
        condition: service_healthy
      elasticsearch-02:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kibana — dashboards, Discover, and alerting UI
  # Pointed at both ES nodes for redundancy.
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=["http://elasticsearch-01:9200","http://elasticsearch-02:9200"]
      - SERVER_NAME=kibana
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "0.5"
        reservations:
          memory: 384m
    volumes:
      - kibana-data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - efk-net
    depends_on:
      elasticsearch-01:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
