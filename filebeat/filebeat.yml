filebeat.autodiscover:
  providers:
    - type: docker
      labels.dedot: true
      templates:
        - condition:
            equals:
              # Only ship containers that explicitly opt in via this Docker label
              docker.container.labels.co.elastic.logs/enabled: "true"
          config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              json.keys_under_root: true
              json.overwrite_keys: true
              json.add_error_key: true
              multiline:
                # Collapse Java stack traces into a single event
                pattern: '^\s'
                negate: false
                match: after

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - add_host_metadata: ~
  - drop_fields:
      # Remove high-cardinality fields that inflate index size
      fields: ["docker.container.image.id", "host.os.codename"]
      ignore_missing: true

output.logstash:
  hosts: ["logstash:5044"]
  bulk_max_size: 2048
  timeout: 30s
  # Filebeat maintains a write offset registry; on reconnect it resumes from
  # last confirmed position — guarantees at-least-once delivery

queue.mem:
  events: 4096
  flush.timeout: 5s

# Backoff on Logstash unavailability — prevents overwhelming a recovering pipeline
backoff.init: 1s
backoff.max: 60s

logging.level: warning
logging.to_files: false      # log to stdout so Filebeat's own logs are capturable
